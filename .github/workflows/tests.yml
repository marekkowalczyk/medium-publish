name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install sanitize
        run: |
          url=$(curl -s https://api.github.com/repos/marekkowalczyk/sanitize/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux_amd64.tar.gz")) | .browser_download_url')
          curl -sSL "$url" | tar -xz sanitize
          sudo mv sanitize /usr/local/bin/

      - name: Install Python dependencies
        run: pip install python-frontmatter pytest

      - name: Run tests
        run: python3 -m pytest tests/ -v
